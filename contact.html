<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <section id="landing">
        <nav>
            <div class="container">
                <div class="row">
                    <div class="nav__bar">
                    <img src="./assets/hbi__logo--full.png" alt="Logo" class="nav__logo">
                    <ul class="nav__list">
                        <li><a href="index.html" class="nav__link 
                            page__link">Home</a>
                        </li>
                        <li><a href="about.html" class="nav__link 
                            page__link">About</a>
                        </li>
                        <li><a href="javascript:void(0)" class="nav__link 
                            page__link" 
                            onclick="openCoverageModal(); return false;">Coverage</a>
                        </li>
                        <li><a href="pricing.html" class="nav__link 
                            page__link">Packages</a>
                        </li>
                        <li><a href="#" class="nav__link 
                            nav__link--primary 
                            " onclick="openModal()">Contact</a>
                        </li>
                    </ul>
                    </div>
                </div>
            </div>
        </nav>
    </section>
        <button onclick="openModal()">Open Modal</button>

        <div class="modal__overlay">
            <div class="modal">
                <button class="modal__close" onclick="closeModal()">
                    &times;
                </button>
                <div class="container">
                    <div class="row">
                        <div class="contact">
                            <div class="contact__header">
                                <h1 class="contact__title">Give us<span class="blue"> a shout</span></h1>
                                <p>We pride ourselves on our customer service.</p>
                            </div>
                            <div class="contact__card">
                                <div class="contact__icons">
                                    <i class="fa-solid fa-phone contact__icon"></i>
                                </div>
                                <div class="contact__info">
                                    <span class="phone__number">Phone Number</span>
                                    <h3 class="contact__phone blue">(870)-283-7044</h3>
                                </div>
                            </div>
                            <div class="contact__boxes">
                                <div class="contact__inputs">
                                    <input class="name" placeholder="Name">
                                    <input class="email" placeholder="E-mail">
                                </div>
                                <textarea class="description" placeholder="How do you do"></textarea>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="coverage__overlay">
        <div class="coverage__modal">
            <button class="coverage__close" onclick="closeCoverageModal()">&times;</button>
            <form class="coverage__form">
                <h2 class="coverage__title">Fill out your Hillbilly Info:</h2>
                <p class="coverage__required">* Required</p>
                <label>First: <input type="text" required></label>
                <label>Last: <input type="text" required></label>
                <label>Address: <input type="text" required></label>
                <label>City: <input type="text" required></label>
                <label>
                    Country:
                    <select>
                        <option>United States</option>
                    </select>
                </label>
                <label>
                    State:
                    <select>
                        <option>Arkansas</option>
                    </select>
                </label>
                <label>Zip: <input type="text"></label>
                <label>Phone: <input type="tel" required></label>
                <label>Email: <input type="email" required></label>
                <label>
                    Where did you hear about us:
                    <select required>
                        <option>Please Select</option>
                        <option>Facebook</option>
                        <option>Google</option>
                        <option>Friend</option>
                        <option>Other</option>
                    </select>
                </label>
                <label>
                    Contact by:
                    <select>
                        <option>Phone</option>
                        <option>Email</option>
                    </select>
                </label>
                <label>
                    Best time to contact:
                    <select>
                        <option>Anytime</option>
                        <option>Morning</option>
                        <option>Afternoon</option>
                        <option>Evening</option>
                    </select>
                </label>
                <label>
                    Comments / Questions:
                    <textarea></textarea>
                </label>
                <button type="submit" class="coverage__submit">Submit</button>
            </form>
        </div>
    </div>


    <footer>
        <div class="container">
            <div class="row footer__row">
                <div class="footer__img">
                    <a href="#">
                        <img src="./assets/hbi__logo.png" alt="Logo" class="footer__logo">
                    </a>
                </div>
                <ul class="nav__list">
                    <li><a href="index.html" class="nav__link page__link">Home</a></li>
                    <li><a href="about.html" class="nav__link page__link">About</a></li>
                    <li><a href="#about" class="nav__link page__link" onclick="openCoverageModal(); return false;">Coverage</a></li>
                    <li><a href="pricing.html" class="nav__link page__link">Packages</a></li>
                    <li><a href="#" class="nav__link page__link" onclick="openModal()">Contact</a></li>
                </ul>
                <p class="footer__copyright">© 2026 Hillbilly Internet. All rights reserved.</p>
            </div>
        </div>
<script src="apps.js"></script>    
</body>
</html>
